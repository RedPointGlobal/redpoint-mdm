{{- $cfg := fromYaml (include "mdm.service" (dict "root" . "override" .Values.logService)) -}}
{{- $name := "rp-mdm-log" -}}
{{- $component := "logservice" -}}
{{- $port := 9904 -}}
{{- $logPath := "/usr/local/app/logs" -}}
{{- if $cfg.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 4 }}
data:
  redpointmdm.properties: |
    mdm.port=9904
    rpmdm.service.logging={{ .Values.coreService.logging.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 4 }}
  {{- $saAnn := include "mdm.cloudidentity.saAnnotations" (dict "root" .) | trim }}
  {{- if $saAnn }}
  annotations:
    {{- $saAnn | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 4 }}
spec:
  ports:
    - port: 80
      targetPort: {{ $port }}
      protocol: TCP
  selector:
    {{- include "mdm.selectorLabels" (dict "name" $name) | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-tcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 4 }}
spec:
  ports:
    - port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
  selector:
    {{- include "mdm.selectorLabels" (dict "name" $name) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 4 }}
spec:
  {{- if not $cfg.autoscaling.enabled }}
  replicas: {{ $cfg.replicas }}
  {{- end }}
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "mdm.selectorLabels" (dict "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mdm.labels" (dict "root" . "name" $name "component" $component) | nindent 8 }}
        {{- with $cfg.customLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "mdm.cloudidentity.podLabels" (dict "root" .) | nindent 8 }}
      {{- $ann := include "mdm.podAnnotations" (dict "cfg" $cfg "port" $port) | trim }}
      {{- if $ann }}
      annotations:
        {{- $ann | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $name }}
      {{- include "mdm.imagePullSecrets" (dict "root" .) | nindent 6 }}
      {{- if $cfg.securityContext.enabled }}
      {{- include "mdm.pod.securityContext" (dict "sc" $cfg.securityContext) | nindent 6 }}
      {{- end }}
      {{- include "mdm.scheduling" (dict "root" . "name" $name) | nindent 6 }}
      containers:
        - name: {{ $name }}
          image: {{ include "mdm.image" (dict "root" . "repo" .Values.global.deployment.images.log) | quote }}
          imagePullPolicy: {{ .Values.global.deployment.images.imagePullPolicy }}
          env:
          - name: MDM_MONGO_URI
            valueFrom:
              secretKeyRef:
                name: {{ .Values.cloudIdentity.secretsManagement.secretName | quote }}
                key: MONGO_CONNECTION_STRING
          ports:
          - name: http
            containerPort: {{ $port }}
            protocol: TCP
          {{- if $cfg.securityContext.enabled }}
          {{- include "mdm.container.securityContext" (dict "sc" $cfg.securityContext) | nindent 10 }}
          {{- end }}
          {{- include "mdm.resources" (dict "cfg" $cfg) | nindent 10 }}
          {{- include "mdm.probes" (dict "cfg" $cfg "path" "/ping") | nindent 10 }}
          volumeMounts:
            - name: {{ $name }}
              mountPath: /usr/local/share/redpointmdm/
            - name: log4js-config
              mountPath: /usr/local/app/authentication-service/log4js_config.json
              subPath: log4js_config.json
            - name: logs
              mountPath: {{ $logPath }}
      volumes:
        - name: {{ $name }}
          configMap:
            name: {{ $name }}
        - name: log4js-config
          configMap:
            name: log4js-config
        - name: logs
          emptyDir: {}
{{- end }}
