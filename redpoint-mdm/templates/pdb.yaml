{{- $services := list
  (dict "name" "rp-mdm-authentication" "override" .Values.authService       "component" "authentication")
  (dict "name" "rp-mdm-core"           "override" .Values.coreService        "component" "coreservice")
  (dict "name" "rp-mdm-log"            "override" .Values.logService         "component" "logservice")
  (dict "name" "rp-mdm-permission"     "override" .Values.permissionService  "component" "permissionService")
  (dict "name" "rp-mdm-ui"             "override" .Values.webUI              "component" "webui")
  (dict "name" "rp-mdm-user"           "override" .Values.userService        "component" "userservice")
-}}
{{- range $svc := $services }}
{{- $cfg := fromYaml (include "mdm.service" (dict "root" $ "override" $svc.override)) }}
{{- if and $cfg.enabled $cfg.probes.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "mdm.labels" (dict "root" $ "name" $svc.name "component" $svc.component) | nindent 4 }}
spec:
  maxUnavailable: {{ $cfg.probes.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "mdm.selectorLabels" (dict "name" $svc.name) | nindent 6 }}
{{- end }}
{{- end }}
